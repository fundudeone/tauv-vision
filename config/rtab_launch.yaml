oak:
  ros__parameters:
    driver:
      i_ip: "192.168.8.22"
      i_tf_parent_frame: "os/base_link"
      i_publish_tf_from_calibration: true
    pipeline_gen:
      i_enable_imu: false
      i_publish_tf: true
      i_external_calibration_path: "/tauv-mono/ros_ws/src/tauv_vision/configs/underwater_calib.json"
      i_child_frame_id : "oak"
      i_pipeline_type: RGBD
    rgb:
      r_set_man_focus: true
      r_focus: 130
      i_fps: 5.0
    stereo:
      i_fps: 5.0
      i_aligned: true
      i_board_socket_id: 0
      i_depth_preset: "HIGH_DETAIL"
      i_subpixel: true
      i_subpixel_fractional_bits: 4
      i_stereo_conf_threshold: 130
      i_publish_left_rect: true
      i_publish_right_rect: true
      i_enable_threshold_filter: true
      i_threshold_filter_min_range: 300
      i_threshold_filter_max_range: 2000
    left:
      i_publish_topic: true
      i_fps: 5.0
    right:
      i_publish_topic: true
      i_fps: 5.0
